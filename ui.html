<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: full;
        font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        padding-top: 150px; /* 고정 헤더 높이만큼 확보 (JS가 실제 높이로 재조정) */
        background: #F5F6FB; /* 검토 결과 영역 배경 */
      }
      button { 
        width: 100%;          
        display: block; 
        height: 48px !important;
        min-width: 64px;
        padding: 0 8px;
        cursor: pointer; 
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        font-family: 'Pretendard', sans-serif;
        margin-bottom: 2px;
        white-space: nowrap;
        box-sizing: border-box;
        line-height: 48px;
      }
      button:disabled {
        border: 1px solid #D9D9D9;
      }
      button.button-full-width {
        width: 100%;
      }
      .button-primary {
        background: #1D6CEB;
        color: #FFFFFF;
        margin-bottom: 20px;
      }
      .button-primary:hover {
        background: #1756bc;
        color: #FFFFFF;
      }
      .button-primary:disabled {
        background: #F5F5F5;
        border: 1px solid #D9D9D9;
        cursor: not-allowed;
        color: #C4C4C4;
      }
      .button-secondary {
        background: #FFFFFF;
        border: 1px solid #D9D9D9;
        color: #353535;
      }
      .button-secondary:hover {
        background: #F2F2F2;
        border: 1px solid #D9D9D9;
        color: #353535;
      }
        .button-secondary:disabled {
          background: #F5F5F5;
          color: #C4C4C4;
        border: 1px solid #D9D9D9;
        cursor: not-allowed;
      }

      .top-fixed {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #FFFFFF;
        padding: 20px 20px 12px 20px;
        border-bottom: 1px solid #e0e0e0;
        box-sizing: border-box;
        z-index: 100;
      }
      .top-fixed #preview {
        margin-bottom: 0; /* 고정 헤더 안에서는 하단 여백 제거 */
      }
      .title-section {
        margin-bottom: 16px;
      }
      .title {
        font-size: 16px;
        font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
      }
      .hint { 
        margin-top: 0;
        margin-bottom: 16px;
        color: #757575; 
        font-size: 14px; 
        line-height: 1.4;
      }
      .preview-section {
        display: none;
        margin-top: 16px;
        padding-top: 12px;
        padding-bottom: 100px; /* 하단 고정 버튼(약 72px)에 가리지 않게 여유 확보 */
      }
      .preview-section.active {
        display: block;
      }
      .preview-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .preview-title {
        font-weight: 600;
        font-size: 14px;
        color: #000000;
        margin-bottom: 8px;
      }
      .toggle-annotations-btn {
        background: #FFFFFF;
        border: 1px solid #D9D9D9;
        border-radius: 4px;
        padding: 0 10px;
        font-size: 12px;
        color: #555;
        cursor: pointer;
        width: auto;
        height: 34px !important; /* 전역 button 48px !important 무시 */
        min-width: unset;
        line-height: 32px; /* 높이 - 상하 보더 */
        margin-bottom: 0;
        white-space: nowrap;
      }
      .toggle-annotations-btn:hover {
        background: #F2F2F2;
      }
      .result-count {
        color: #1D6CEB;
      }
      .checkbox-select-all {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
      }
      .checkbox-select-all input[type="checkbox"] {
        width: 18px;
        height: 18px;
        flex-shrink: 0; /* 좁아져도 찌그러지지 않게 비율 고정 */
        cursor: pointer;
        margin: 0;
        accent-color: #1D6CEB;
        border: 1px solid #D9D9D9;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-color: white;
        border-radius: 2px;
        position: relative;
      }
      .checkbox-select-all input[type="checkbox"]:checked {
        background-color: #1D6CEB;
        border-color: #1D6CEB;
      }
      .checkbox-select-all input[type="checkbox"]:checked::after {
        content: '';
        position: absolute;
        left: 5px;
        top: 2px;
        width: 4px;
        height: 8px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      .checkbox-select-all label {
        font-weight: 500;
        color: #333;
        cursor: pointer;
        margin: 0;
      }
      .checkbox-select-all span {
        font-size: 14px;
        color: #353535;
      }
      /* 최상위 프레임(화면) 단위 섹션 헤더 */
      .preview-group-header {
        font-size: 13px;
        font-weight: 700;
        color: #353535;
        margin: 24px 0 12px;
        word-break: break-all;
      }
      .preview-group-header:first-child {
        margin-top: 0;
      }
      .preview-item-wrapper {
        margin-bottom: 20px;
      }
      .preview-item-header {
        font-weight: 600;
        color: #000000;
        font-size: 12px;
        margin-bottom: 8px;
      }
      .preview-item {
        background: #ffffff;
        border: 1px solid #D9D9D9;
        border-radius: 8px;
        font-size: 14px;
        padding: 20px;
      }
      .preview-item:hover {
        background: #F7F7F7;
      }
      .preview-item.selected {
        border: 1px solid #1D6CEB;
        background: #E2F1FF;
      }
      /* 변경 전/제안은 박스 없이 가로 구분선 하나로만 구분 */
      .preview-before-box {
        padding-bottom: 12px;
        border-bottom: 1px solid #E5E5E5;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .preview-after-box {
        padding-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .preview-before {
        color: #333;
        word-break: break-word;
      }
      .preview-after {
        color: #333;
        word-break: break-word;
      }
      .preview-reason {
        margin-top: 8px;
        padding: 8px 12px;
        background: #F5F5F5;
        border-radius: 4px;
        font-size: 12px;
        color: #666;
        line-height: 1.6;
      }
      .reason-item {
        margin-top: 4px;
      }
      .reason-item:first-child {
        margin-top: 0;
      }
      .preview-label {
        font-weight: 600;
        color: #666;
        display: inline-block;
        background: #F5F5F5;
        border: 1px solid #D9D9D9;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 12px;
        width: fit-content;
      }
      .preview-label-before {
        font-weight: 600;
        color: #C62828;
        display: inline-block;
        background: #FFEBEE;
        border: 1px solid #FFCDD2;
        border-radius: 999px; /* 알약 형태 */
        height: 28px;
        line-height: 26px; /* 보더 제외 수직 중앙 */
        padding: 0 10px;
        box-sizing: border-box;
        font-size: 10px;
        width: fit-content;
      }
      .preview-label-after {
        font-weight: 600;
        color: #1565C0;
        display: inline-block;
        background: #E3F2FD;
        border: 1px solid #90CAF9;
        border-radius: 999px; /* 알약 형태 */
        height: 28px;
        line-height: 26px; /* 보더 제외 수직 중앙 */
        padding: 0 10px;
        box-sizing: border-box;
        font-size: 10px;
        width: fit-content;
      }
      .text-changed-before {
        color: #ff3b30;
        font-weight: 500;
      }
      .text-changed-after {
        color: #1D6CEB;
        font-weight: 500;
      }
      .preview-arrow {
        color: #000000;
        margin: 4px 0;
        font-size: 10px;
        text-align: center;
      }
      .no-changes {
        color: #999;
        font-size: 11px;
        text-align: center;
        padding: 12px;
      }
      .message-box {
        display: none;
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 4px;
        padding: 12px;
        margin-top: 12px;
        color: #856404;
        font-size: 14px;
        text-align: center;
      }
      .message-box.active {
        display: block;
      }
      .button-group {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: none;
        flex-direction: row;
        gap: 8px;
        padding: 12px 20px;
        background: white;
        z-index: 1000;
        box-sizing: border-box;
      }
      .button-group.active {
        display: flex;
      }
      .button-group button {
        margin-bottom: 0;
        flex: 1;
      }
      /* 맨 위로 플로팅 버튼 — 스크롤 중에만 보임 */
      .scroll-top-btn {
        position: fixed;
        right: 20px;
        bottom: 72px; /* 하단 버튼 바 위 */
        width: 56px !important; /* 전역 button 규칙(width 100%, height 48px !important)에 안 찌그러지게 고정 */
        height: 56px !important;
        border-radius: 50%;
        border: 1px solid #e5e5e5;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 1500;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        padding: 0;
      }
      .scroll-top-btn.visible {
        opacity: 1;
        pointer-events: auto;
      }
      .scroll-top-btn:hover {
        background: #f5f5f5;
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.8);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2000;
      }
      .loading-overlay.active {
        display: flex;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #1D6CEB;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 12px;
      }
      .loading-progress {
        font-size: 14px;
        color: #1D6CEB;
        font-weight: 500;
        margin-top: 8px;
      }
      .loading-status {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
        text-align: center;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .toast-notification {
        position: fixed;
        bottom: 80px; /* 플로팅 버튼 위에 표시 */
        left: 20px;
        right: 20px;
        width: calc(100% - 40px);
        background: rgba(34, 34, 34, 0.9);
        color: white;
        padding: 12px 20px;
        border-radius: 20px;
        font-size: 14px;
        z-index: 1001; /* 플로팅 버튼(z-index: 1000) 위에 표시 */
        display: none;
        text-align: center;
        word-break: break-word;
        box-sizing: border-box;
      }
      .toast-notification.show {
        display: block;
        animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .rs-handle { position: fixed; z-index: 9999; }
      .rs-n  { top:0;    left:6px;  right:6px; height:4px; cursor:n-resize;  }
      .rs-s  { bottom:0; left:6px;  right:6px; height:4px; cursor:s-resize;  }
      .rs-e  { right:0;  top:6px; bottom:6px;  width:4px;  cursor:e-resize;  }
      .rs-w  { left:0;   top:6px; bottom:6px;  width:4px;  cursor:w-resize;  }
      .rs-nw { top:0; left:0;   width:8px; height:8px; cursor:nw-resize; }
      .rs-ne { top:0; right:0;  width:8px; height:8px; cursor:ne-resize; }
      .rs-sw { bottom:0; left:0;  width:8px; height:8px; cursor:sw-resize; }
      .rs-se { bottom:0; right:0; width:8px; height:8px; cursor:se-resize; }
    </style>
  </head>
  <body>
    <div id="topFixed" class="top-fixed">
      <div class="title-section">
        <div class="title">에스원 UX Writing Checker</div>
        <div class="hint">텍스트 레이어 또는 Frame을 선택한 뒤 [검토하기] 버튼을 눌러주세요.</div>
      </div>
      <button id="preview" class="button-primary button-full-width">검토하기</button>
    </div>
    <div class="rs-handle rs-n"></div>
    <div class="rs-handle rs-s"></div>
    <div class="rs-handle rs-e"></div>
    <div class="rs-handle rs-w"></div>
    <div class="rs-handle rs-nw"></div>
    <div class="rs-handle rs-ne"></div>
    <div class="rs-handle rs-sw"></div>
    <div class="rs-handle rs-se"></div>
    <div id="toastNotification" class="toast-notification"></div>
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-spinner"></div>
      <div id="loadingProgress" class="loading-progress">0%</div>
      <div id="loadingStatus" class="loading-status">준비 중...</div>
    </div>

    <div id="previewSection" class="preview-section">
      <div class="preview-header">
        <div class="preview-title">검토 결과 : </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <button id="clearAnnotations" class="toggle-annotations-btn">코멘트 삭제</button>
          <button id="toggleAnnotations" class="toggle-annotations-btn">코멘트 숨기기</button>
          <label class="checkbox-select-all">
            <input type="checkbox" id="selectAll" />
            <span>전체 선택</span>
          </label>
        </div>
      </div>
      <div id="previewList"></div>
    </div>

    <div class="button-group">
      <button id="apply" class="button-primary">변경하기</button>
      <button id="cancel" class="button-secondary">취소</button>
    </div>

    <button id="scrollTopBtn" class="scroll-top-btn" title="맨 위로" aria-label="맨 위로">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5" stroke="#4A4A4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <script>
      let previewData = [];
      let selectedNodeIds = new Set(); // 선택된 노드 ID들 (여러 개 선택 가능)
      // 검토 결과 추가 후 "맨 아래로 스크롤"이 예약된 상태.
      // 이 동안 캔버스 자동 선택의 scrollIntoView는 건너뛰고,
      // 검토가 완전히 끝나는 hide-loading 시점에 맨 아래로 한 번 더 확정한다.
      let pendingScrollToBottom = false;

      function scrollListToBottom() {
        // smooth는 뒤이어 오는 스크롤/레이아웃에 끊길 수 있어 즉시 점프로 확정
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'auto' });
      }

      // 고정 헤더 높이만큼 본문 상단 여백을 맞춘다 (창 폭이 바뀌면 안내문 줄바꿈으로 높이가 달라짐)
      function adjustTopPadding() {
        const tf = document.getElementById('topFixed');
        if (tf) document.body.style.paddingTop = tf.offsetHeight + 'px';
      }
      adjustTopPadding();
      window.addEventListener('resize', adjustTopPadding);
      window.addEventListener('load', adjustTopPadding);

      // 맨 위로 플로팅 버튼 — 스크롤 중에만 표시, 멈추면 잠시 후 숨김
      const scrollTopBtn = document.getElementById('scrollTopBtn');
      let scrollHideTimer = null;
      function hideScrollTopBtnLater() {
        if (scrollHideTimer) clearTimeout(scrollHideTimer);
        scrollHideTimer = setTimeout(() => scrollTopBtn.classList.remove('visible'), 1500);
      }
      window.addEventListener('scroll', () => {
        if (window.scrollY > 150) {
          scrollTopBtn.classList.add('visible');
          hideScrollTopBtnLater();
        } else {
          // 맨 위 근처에서는 굳이 안 보여줌
          scrollTopBtn.classList.remove('visible');
        }
      }, { passive: true });
      // 누르려고 마우스를 올린 동안에는 사라지지 않게
      scrollTopBtn.addEventListener('mouseenter', () => {
        if (scrollHideTimer) clearTimeout(scrollHideTimer);
      });
      scrollTopBtn.addEventListener('mouseleave', hideScrollTopBtnLater);
      scrollTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // 버튼 활성/비활성화 함수
      function updatePreviewButtonState(hasSelection) {
        const previewButton = document.getElementById('preview');
        if (previewButton) {
          previewButton.disabled = !hasSelection;
        }
      }

      // 초기 로드 시 버튼 비활성화 (선택 상태 확인 전까지)
      updatePreviewButtonState(false);

      document.getElementById('preview').onclick = () => {
        if (document.getElementById('preview').disabled) {
          return;
        }
        selectedNodeIds.clear(); // 미리보기 새로고침 시 선택 초기화
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
          selectAllCheckbox.checked = false;
        }
        // 플로팅 버튼 숨기기
        const buttonGroup = document.querySelector('.button-group');
        if (buttonGroup) {
          buttonGroup.classList.remove('active');
        }
        parent.postMessage({ pluginMessage: { type: 'PREVIEW' } }, '*');
      };

      document.getElementById('selectAll').addEventListener('change', (e) => {
        const checkbox = e.target;
        // 체크박스 상태에 따라 모든 항목 선택/해제
        if (checkbox.checked) {
          // 모두 선택
          selectedNodeIds = new Set(previewData.map(item => item.nodeId));
        } else {
          // 모두 해제
          selectedNodeIds.clear();
        }
        
        // 선택된 노드들을 Figma에도 반영
        parent.postMessage({ 
          pluginMessage: { 
            type: 'SELECT_NODES', 
            nodeIds: Array.from(selectedNodeIds)
          } 
        }, '*');
        
        // UI 업데이트
        displayPreview(previewData);
      });

      document.getElementById('apply').onclick = () => {
        // 선택된 항목이 있으면 선택된 항목만, 없으면 모든 항목 변경
        let dataToApply = previewData;
        if (selectedNodeIds.size > 0) {
          dataToApply = previewData.filter(item => selectedNodeIds.has(item.nodeId));
        }
        
        if (dataToApply.length === 0) {
          alert('변경할 항목을 선택해주세요.');
          return;
        }
        
        // 로딩 표시
        const loadingOverlay = document.getElementById('loadingOverlay');
        if (loadingOverlay) {
          loadingOverlay.classList.add('active');
        }
        
        parent.postMessage({ pluginMessage: { type: 'APPLY', data: dataToApply } }, '*');
      };

      // 8방향 리사이즈 핸들
      (() => {
        // dw/dh: 마우스 이동 방향이 너비/높이에 적용되는 부호
        const handles = [
          { cls: 'rs-n',  dw:  0, dh: -1 },
          { cls: 'rs-s',  dw:  0, dh:  1 },
          { cls: 'rs-e',  dw:  1, dh:  0 },
          { cls: 'rs-w',  dw: -1, dh:  0 },
          { cls: 'rs-nw', dw: -1, dh: -1 },
          { cls: 'rs-ne', dw:  1, dh: -1 },
          { cls: 'rs-sw', dw: -1, dh:  1 },
          { cls: 'rs-se', dw:  1, dh:  1 },
        ];

        let active = null, startX = 0, startY = 0, startW = 0, startH = 0;

        handles.forEach(({ cls, dw, dh }) => {
          const el = document.querySelector('.' + cls);
          el.addEventListener('mousedown', (e) => {
            active = { dw, dh };
            // 화면 기준 좌표 사용: 창을 움직여도 좌표계가 안 바뀌어 피드백 루프(왼쪽으로 빨려듦) 방지
            startX = e.screenX;
            startY = e.screenY;
            startW = window.innerWidth;
            startH = window.innerHeight;
            e.preventDefault();
          });
        });

        document.addEventListener('mousemove', (e) => {
          if (!active) return;
          const dx = e.screenX - startX;
          const dy = e.screenY - startY;
          const w = active.dw !== 0 ? Math.max(300, Math.min(800,  startW + active.dw * dx)) : startW;
          const h = active.dh !== 0 ? Math.max(400, Math.min(1200, startH + active.dh * dy)) : startH;
          // 왼쪽(dw<0)/위쪽(dh<0) 핸들이면 반대쪽 가장자리를 고정하도록 앵커 표시
          parent.postMessage({ pluginMessage: {
            type: 'RESIZE_UI',
            width: Math.round(w),
            height: Math.round(h),
            anchorRight: active.dw < 0,
            anchorBottom: active.dh < 0
          } }, '*');
        });

        document.addEventListener('mouseup', () => { active = null; });
      })();

      document.getElementById('clearAnnotations').onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'CLEAR_ANNOTATIONS' } }, '*');
      };

      document.getElementById('toggleAnnotations').onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'TOGGLE_ANNOTATIONS' } }, '*');
      };

      document.getElementById('cancel').onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'CANCEL' } }, '*');
        document.getElementById('previewSection').classList.remove('active');
        const buttonGroup = document.querySelector('.button-group');
        if (buttonGroup) {
          buttonGroup.classList.remove('active');
        }
        previewData = [];
        selectedNodeIds.clear();
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
          selectAllCheckbox.checked = false;
        }
      };

      // 토스트 알림 표시 함수
      function showToast(message) {
        const toast = document.getElementById('toastNotification');
        if (toast) {
          toast.textContent = message;
          toast.classList.add('show');
          
          // 3초 후 자동으로 숨기기
          setTimeout(() => {
            toast.classList.remove('show');
          }, 3000);
        }
      }

      window.addEventListener('message', (event) => {
        if (event.data.pluginMessage.type === 'annotations-visibility') {
          const btn = document.getElementById('toggleAnnotations');
          if (btn) btn.textContent = event.data.pluginMessage.visible ? '코멘트 숨기기' : '코멘트 보이기';
        }

        if (event.data.pluginMessage.type === 'annotations-cleared') {
          const btn = document.getElementById('toggleAnnotations');
          if (btn) btn.textContent = '코멘트 숨기기';
        }

        if (event.data.pluginMessage.type === 'selection-changed') {
          updatePreviewButtonState(event.data.pluginMessage.hasSelection);
        }

        // 캔버스에서 노드/코멘트를 선택하면 검토 목록에서도 같은 항목을 선택 표시
        if (event.data.pluginMessage.type === 'canvas-selection') {
          const ids = event.data.pluginMessage.nodeIds || [];
          selectedNodeIds = new Set(ids);
          let firstEl = null;
          document.querySelectorAll('.preview-item').forEach(el => {
            if (selectedNodeIds.has(el.dataset.nodeId)) {
              el.classList.add('selected');
              if (!firstEl) firstEl = el;
            } else {
              el.classList.remove('selected');
            }
          });
          const selectAllCheckbox = document.getElementById('selectAll');
          if (selectAllCheckbox) selectAllCheckbox.checked = false;
          // 선택된 첫 항목이 목록 가운데로 오게 스크롤
          // (검토 직후의 자동 선택은 제외 — 맨 아래 스크롤을 덮어쓰지 않도록)
          if (firstEl && firstEl.scrollIntoView && !pendingScrollToBottom) {
            firstEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }
        }
        
        if (event.data.pluginMessage.type === 'show-toast') {
          showToast(event.data.pluginMessage.message);
        }
        
        if (event.data.pluginMessage.type === 'show-loading') {
          const loadingOverlay = document.getElementById('loadingOverlay');
          const loadingProgress = document.getElementById('loadingProgress');
          const loadingStatus = document.getElementById('loadingStatus');
          if (loadingOverlay) {
            loadingOverlay.classList.add('active');
          }
          if (loadingProgress) {
            loadingProgress.textContent = '0%';
          }
          if (loadingStatus) {
            loadingStatus.textContent = '준비 중...';
          }
        }
        
        if (event.data.pluginMessage.type === 'update-progress') {
          const loadingProgress = document.getElementById('loadingProgress');
          const loadingStatus = document.getElementById('loadingStatus');
          if (loadingProgress) {
            const progress = event.data.pluginMessage.progress || 0;
            loadingProgress.textContent = Math.round(progress) + '%';
          }
          if (loadingStatus && event.data.pluginMessage.status) {
            loadingStatus.textContent = event.data.pluginMessage.status;
          }
        }
        
        if (event.data.pluginMessage.type === 'hide-loading') {
          const loadingOverlay = document.getElementById('loadingOverlay');
          if (loadingOverlay) {
            loadingOverlay.classList.remove('active');
          }
          // 검토가 완전히 끝난 시점에 맨 아래 스크롤 확정
          if (pendingScrollToBottom) {
            requestAnimationFrame(() => {
              scrollListToBottom();
              // 캔버스 선택 동기화(canvas-selection)가 뒤늦게 도착해
              // 위쪽 항목으로 가운데 스크롤을 걸 수 있으므로, 억제를 잠시 뒤에 해제
              setTimeout(() => {
                scrollListToBottom(); // 그 사이 끼어든 스크롤이 있어도 최종적으로 맨 아래 확정
                pendingScrollToBottom = false;
              }, 800);
            });
          }
        }

        if (event.data.pluginMessage.type === 'preview-add') {
          const newItems = event.data.pluginMessage.data;
          // nodeId 기준으로 중복 제거 후 누적
          const map = new Map(previewData.map(item => [item.nodeId, item]));
          for (const item of newItems) {
            map.set(item.nodeId, item);
          }
          previewData = Array.from(map.values());
          displayPreview(previewData);

          // 새 결과는 목록 맨 아래에 누적되므로 맨 아래로 스크롤.
          // 검토가 끝나는 hide-loading에서 한 번 더 확정한다 (중간 메시지에 밀리지 않게)
          if (newItems.length > 0) {
            pendingScrollToBottom = true;
            requestAnimationFrame(scrollListToBottom);
          }
        }
        
        if (event.data.pluginMessage.type === 'remove-changed-items') {
          // 변경된 항목만 리스트에서 제거
          const changedNodeIds = event.data.pluginMessage.changedNodeIds;
          const beforeLength = previewData.length;
          
          previewData = previewData.filter(item => !changedNodeIds.includes(item.nodeId));
          
          // 변경된 항목을 선택 상태에서 제거
          changedNodeIds.forEach(nodeId => {
            selectedNodeIds.delete(nodeId);
          });
          
          console.log(`[UI] 변경 전 ${beforeLength}개, 변경된 항목: ${changedNodeIds.length}개, 남은 항목: ${previewData.length}개`);
          
          // 모든 항목이 변경되면 플로팅 버튼 숨기기
          if (previewData.length === 0) {
            const buttonGroupEl = document.querySelector('.button-group');
            if (buttonGroupEl) {
              buttonGroupEl.classList.remove('active');
            }
            document.getElementById('previewSection').classList.remove('active');
          }
          
          // 리스트 업데이트
          displayPreview(previewData);
        }
      });

      function displayPreview(data) {
        const previewList = document.getElementById('previewList');
        const previewSection = document.getElementById('previewSection');
        const btnGroupEl = document.querySelector('.button-group');
        
        // 변경점이 없으면 미리보기 섹션 및 플로팅 버튼 숨기기
        if (data.length === 0) {
          previewSection.classList.remove('active');
          if (btnGroupEl) {
            btnGroupEl.classList.remove('active');
          }
          selectedNodeIds.clear(); // 선택 초기화
          return;
        }

        // 플로팅 버튼 그룹 표시
        if (btnGroupEl) {
          btnGroupEl.classList.add('active');
        }

        previewList.innerHTML = '';
        
        // 검토 결과 제목에 총 건수 업데이트
        const previewTitle = document.querySelector('.preview-title');
        if (previewTitle) {
          previewTitle.innerHTML = `검토 결과 <span class="result-count">${data.length}</span>건`;
        }
        
        // 전체 선택 체크박스 상태 업데이트
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
          selectAllCheckbox.checked = selectedNodeIds.size === data.length && data.length > 0;
        }
        
        // innerHTML에 넣기 전 HTML 특수문자 이스케이프 (캔버스 텍스트에 <, & 등이 있어도 안전)
        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        // 변경 구간을 단어 단위로 색칠한다.
        // "방범구역"→"경비구역"이 "방범/경비"만 색칠되거나, 마침표만 바뀌어 색칠이 안 보이는 일이
        // 없도록 양옆 공통 부분의 인접 단어(공백 전까지)를 흡수해 단어 전체를 강조한다.
        function mergeWhitespaceChangeParts(parts) {
          const out = [];
          for (let idx = 0; idx < parts.length; idx++) {
            const p = parts[idx];
            if (!p.changed) { out.push(p); continue; }
            let prefix = '';
            const prev = out[out.length - 1];
            if (prev && !prev.changed) {
              const m = prev.before.match(/(\S+)$/); // 이전 공통부분의 꼬리 단어
              if (m) {
                prefix = m[1];
                prev.before = prev.before.slice(0, -prefix.length);
                prev.after = prev.after.slice(0, -prefix.length);
                if (prev.before === '') out.pop();
              }
            }
            let suffix = '';
            const next = parts[idx + 1];
            if (next && !next.changed) {
              const m = next.before.match(/^(\S+)/); // 다음 공통부분의 머리 단어
              if (m) {
                suffix = m[1];
                // 변경과 무관한 꼬리 조사는 끌어오지 않는다 ("고객인증번호를"의 '를' 등)
                const pm = suffix.match(/(에게서|에서|에게|까지|부터|처럼|보다|으로|이나|라도|마저|조차|[을를이가은는과와도만의에로])$/);
                if (pm) suffix = suffix.slice(0, suffix.length - pm[0].length);
                if (suffix) {
                  next.before = next.before.slice(suffix.length);
                  next.after = next.after.slice(suffix.length);
                }
              }
            }
            out.push({ before: prefix + p.before + suffix, after: prefix + p.after + suffix, changed: true });
          }
          return out;
        }

        // 변경된 부분을 찾아서 색상으로 강조하는 함수
        function highlightChanges(before, after) {
          if (before === after) {
            return { beforeHtml: before, afterHtml: after };
          }
          
          // 현재 위치에서 가장 가까운 공통 부분을 찾아 변경/공통 구간 구분
          const parts = [];
          let i = 0, j = 0;
          const minMatchLen = 2;
          
          while (i < before.length || j < after.length) {
            let bestK = -1, bestL = -1, bestMatchLen = 0;
            
            // (i,j)에 가장 가까운 공통 부분 찾기 (거리 최소화)
            for (let k = i; k < before.length; k++) {
              for (let l = j; l < after.length; l++) {
                let matchLen = 0;
                while (k + matchLen < before.length && 
                       l + matchLen < after.length && 
                       before[k + matchLen] === after[l + matchLen]) {
                  matchLen++;
                }
                const dist = (k - i) + (l - j);
                const bestDist = (bestK - i) + (bestL - j);
                if ((matchLen >= minMatchLen || (matchLen > 0 && (k + matchLen === before.length || l + matchLen === after.length))) &&
                    (bestK < 0 || dist < bestDist || (dist === bestDist && matchLen > bestMatchLen))) {
                  bestK = k; bestL = l; bestMatchLen = matchLen;
                }
              }
            }
            
            if (bestK >= 0 && bestMatchLen > 0) {
              if (bestK > i || bestL > j) {
                parts.push({
                  before: before.substring(i, bestK),
                  after: after.substring(j, bestL),
                  changed: true
                });
              }
              parts.push({
                before: before.substring(bestK, bestK + bestMatchLen),
                after: after.substring(bestL, bestL + bestMatchLen),
                changed: false
              });
              i = bestK + bestMatchLen;
              j = bestL + bestMatchLen;
            } else {
              parts.push({
                before: before.substring(i),
                after: after.substring(j),
                changed: true
              });
              break;
            }
          }
          
          // 공백만 바뀐 띄어쓰기 변경은 단어 단위로 색 범위를 넓힌다
          const merged = mergeWhitespaceChangeParts(parts);

          // HTML 생성 (캔버스 텍스트에 <, & 등이 있어도 깨지지 않게 이스케이프)
          const beforeHtml = merged.map(part =>
            part.changed
              ? `<span class="text-changed-before">${escapeHtml(part.before)}</span>`
              : escapeHtml(part.before)
          ).join('');

          const afterHtml = merged.map(part =>
            part.changed
              ? `<span class="text-changed-after">${escapeHtml(part.after)}</span>`
              : escapeHtml(part.after)
          ).join('');
          
          return { beforeHtml, afterHtml };
        }
        
        // 최상위 프레임(화면) 기준으로 묶기 — 등장 순서 유지
        const frameGroups = new Map(); // frameId -> { name, items }
        for (const item of data) {
          const key = item.frameId || '';
          if (!frameGroups.has(key)) frameGroups.set(key, { name: item.frameName || '', items: [] });
          frameGroups.get(key).items.push(item);
        }

        for (const [, frameGroup] of frameGroups) {
          // 프레임 이름 섹션 헤더
          if (frameGroup.name) {
            const groupHeader = document.createElement('div');
            groupHeader.className = 'preview-group-header';
            groupHeader.textContent = frameGroup.name;
            previewList.appendChild(groupHeader);
          }

          frameGroup.items.forEach((item) => {
          // Wrapper div 생성
          const wrapper = document.createElement('div');
          wrapper.className = 'preview-item-wrapper';

          // Preview item div 생성
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.style.cursor = 'pointer';
          div.dataset.nodeId = item.nodeId;
          
          // 선택된 항목이면 선택 상태 표시
          if (selectedNodeIds.has(item.nodeId)) {
            div.classList.add('selected');
          }
          
          // 변경된 부분 강조
          const { beforeHtml, afterHtml } = highlightChanges(item.before, item.after);
          
          // 변경 이유를 항목별로 나눠서 표시
          const reasonItems = item.reason ? item.reason.split(' - ').map(r => r.trim()).filter(r => r) : [];
          const reasonHtml = reasonItems.length > 0 
            ? `<div class="preview-reason">${reasonItems.map(r => `<div class="reason-item">• ${escapeHtml(r)}</div>`).join('')}</div>`
            : '';
          
          div.innerHTML = `
            <div class="preview-before-box">
              <span class="preview-label-before">원문</span>
              <div class="preview-before">${beforeHtml}</div>
            </div>
            <div class="preview-after-box">
              <span class="preview-label-after">수정안</span>
              <div class="preview-after">${afterHtml}</div>
              ${reasonHtml}
            </div>
          `;
          
          // Wrapper에 아이템 추가
          wrapper.appendChild(div);
          
          // 클릭 시 해당 텍스트 레이어로 이동 및 단일 선택/해제
          div.addEventListener('click', () => {
            // 클릭한 항목이 이미 선택되어 있으면 해제
            if (selectedNodeIds.has(item.nodeId)) {
              selectedNodeIds.delete(item.nodeId);
              div.classList.remove('selected');
            } else {
              // 기존 선택 모두 해제
              selectedNodeIds.clear();
              document.querySelectorAll('.preview-item').forEach(el => {
                el.classList.remove('selected');
              });
              
              // 클릭한 항목만 선택
              selectedNodeIds.add(item.nodeId);
              div.classList.add('selected');

              // 선택한 항목이 목록 가운데로 오게 스크롤
              div.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
            
            // 전체 선택 체크박스 해제 (단일 선택이므로)
            const selectAllCheckbox = document.getElementById('selectAll');
            if (selectAllCheckbox) {
              selectAllCheckbox.checked = false;
            }
            
            // 선택된 노드들을 Figma에도 반영
            parent.postMessage({ 
              pluginMessage: { 
                type: 'SELECT_NODES', 
                nodeIds: Array.from(selectedNodeIds)
              } 
            }, '*');
            
            parent.postMessage({ 
              pluginMessage: { 
                type: 'FOCUS_NODE', 
                nodeId: item.nodeId 
              } 
            }, '*');
          });
          
          previewList.appendChild(wrapper);
          });
        }

        previewSection.classList.add('active');
        
        // 플로팅 버튼 그룹 표시
        const btnGroup = document.querySelector('.button-group');
        if (btnGroup && data.length > 0) {
          btnGroup.classList.add('active');
        }
      }
    </script>
  </body>
</html>
