<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0; /* 브라우저 기본 마진(8px) 제거 — 고정 헤더(검토하기 버튼)와 좌우 정렬 맞춤 */
        font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        padding-top: 150px; /* 고정 헤더 높이만큼 확보 (JS가 실제 높이로 재조정) */
        background: #FFFFFF;
      }
      button { 
        width: 100%;          
        display: block; 
        height: 48px !important;
        min-width: 64px;
        padding: 0 8px;
        cursor: pointer; 
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        font-family: 'Pretendard', sans-serif;
        margin-bottom: 2px;
        white-space: nowrap;
        box-sizing: border-box;
        line-height: 48px;
      }
      button:disabled {
        border: 1px solid #D9D9D9;
      }
      button.button-full-width {
        width: 100%;
      }
      .button-primary {
        background: #1D6CEB;
        color: #FFFFFF;
        margin-bottom: 20px;
      }
      .button-primary:hover {
        background: #1756bc;
        color: #FFFFFF;
      }
      .button-primary:disabled {
        background: #F5F5F5;
        border: 1px solid #D9D9D9;
        cursor: not-allowed;
        color: #C4C4C4;
      }
      .button-secondary {
        background: #FFFFFF;
        border: 1px solid #D9D9D9;
        color: #353535;
      }
      .button-secondary:hover {
        background: #F2F2F2;
        border: 1px solid #D9D9D9;
        color: #353535;
      }
        .button-secondary:disabled {
          background: #F5F5F5;
          color: #C4C4C4;
        border: 1px solid #D9D9D9;
        cursor: not-allowed;
      }

      .top-fixed {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #FFFFFF;
        padding: 20px 20px 12px 20px;
        border-bottom: 1px solid #e0e0e0;
        box-sizing: border-box;
        z-index: 100;
      }
      /* 세 기능 화면 헤더는 flex 컬럼 (showView가 display:flex로 표시) */
      #topFixed, #recommendHeader, #translateHeader {
        flex-direction: column;
      }
      /* 추천/번역 헤더는 동일 높이로 고정 → 버튼이 항상 같은 위치 */
      #recommendHeader, #translateHeader {
        min-height: 320px;
        border-bottom: none; /* 검토 빈 화면과 동일하게 버튼 아래 구분선 제거 */
      }
      /* 입력창이 헤더의 남는 세로 공간을 채움 (버튼은 항상 바닥) */
      #recommendHeader .feature-input, #translateHeader .feature-input {
        flex: 1 1 auto;
      }
      /* 추천 후 컴팩트 헤더: 큰 입력창·안내문은 숨기고
         입력 내용(읽기 전용) + [다시 추천받기]만 상단에 고정 — 아래 추천 리스트만 스크롤 */
      #recommendHeader.compact { min-height: 0; }
      #recommendHeader.compact .hint,
      #recommendHeader.compact #recommendInput { display: none; }
      #recommendEntered { display: none; margin-bottom: 12px; }
      #recommendHeader.compact #recommendEntered { display: block; }
      #recommendEntered .entered-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      #recommendEntered .result-label { margin: 0; }
      #recommendEntered .result-original { max-height: 96px; overflow-y: auto; }
      /* 검토 빈 화면: 동일 높이 + 버튼 아래 구분선 숨김 + 예시 그래픽이 남는 공간을 채워 세로 가운데 */
      #topFixed.empty-review {
        min-height: 320px;
        border-bottom: none;
      }
      #topFixed.empty-review #reviewEmpty {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      /* 고정 헤더 안 실행 버튼(검토/추천/번역)은 하단 여백 제거 → 버튼 위치 통일 */
      .top-fixed #preview,
      .top-fixed #recommendRun,
      .top-fixed #translateRun {
        margin-bottom: 0;
      }
      .title-section {
        margin-bottom: 16px;
      }
      /* 검토 화면: 타이틀 + 초기화 버튼 한 줄 배치 */
      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .reset-btn {
        display: none; /* 결과가 있을 때만 JS로 표시 */
        width: auto !important;
        height: auto !important;
        min-width: unset;
        line-height: normal !important;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        padding: 5px 10px;
        margin: 0;
        background: none;
        border: 1px solid #D9D9D9;
        border-radius: 6px;
        color: #757575;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }
      .reset-btn.visible { display: inline-flex; }
      .reset-btn:hover { background: #F5F5F5; color: #353535; border-color: #C4C4C4; }
      .reset-btn svg { display: block; }
      .title {
        font-size: 16px;
        font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
      }
      .hint { 
        margin-top: 0;
        margin-bottom: 16px;
        color: #757575; 
        font-size: 14px; 
        line-height: 1.4;
      }
      .preview-section {
        display: none;
        margin-top: 16px;
        padding-top: 12px;
        padding-bottom: 100px; /* 하단 고정 버튼(약 72px)에 가리지 않게 여유 확보 */
      }
      .preview-section.active {
        display: block;
      }
      /* 검토 결과 블록 (고정 헤더 안, 검토하기 버튼 아래) — 결과가 있을 때만 표시 */
      .result-header {
        display: none;
        margin-top: 16px;
      }
      .result-header.active {
        display: block;
      }
      /* 검토 결과 타이틀 아래 줄: 좌측 전체 선택, 우측 코멘트 삭제/숨기기 */
      .preview-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .preview-toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .preview-title {
        font-weight: 600;
        font-size: 14px;
        color: #000000;
        margin-bottom: 8px;
      }
      .toggle-annotations-btn {
        background: #FFFFFF;
        border: 1px solid #D9D9D9;
        border-radius: 4px;
        padding: 0 10px;
        font-size: 12px;
        color: #555;
        cursor: pointer;
        width: auto;
        height: 34px !important; /* 전역 button 48px !important 무시 */
        min-width: unset;
        line-height: 32px; /* 높이 - 상하 보더 */
        margin-bottom: 0;
        white-space: nowrap;
      }
      .toggle-annotations-btn:hover {
        background: #F2F2F2;
      }
      .toggle-annotations-btn:disabled {
        background: #F5F5F5;
        color: #C4C4C4;
        cursor: not-allowed;
      }
      .result-count {
        color: #1D6CEB;
      }
      .checkbox-select-all {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
      }
      .checkbox-select-all input[type="checkbox"] {
        width: 18px;
        height: 18px;
        flex-shrink: 0; /* 좁아져도 찌그러지지 않게 비율 고정 */
        cursor: pointer;
        margin: 0;
        accent-color: #1D6CEB;
        border: 1px solid #D9D9D9;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-color: white;
        border-radius: 2px;
        position: relative;
      }
      .checkbox-select-all input[type="checkbox"]:checked {
        background-color: #1D6CEB;
        border-color: #1D6CEB;
      }
      .checkbox-select-all input[type="checkbox"]:checked::after {
        content: '';
        position: absolute;
        left: 5px;
        top: 2px;
        width: 4px;
        height: 8px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      .checkbox-select-all label {
        font-weight: 500;
        color: #333;
        cursor: pointer;
        margin: 0;
      }
      .checkbox-select-all span {
        font-size: 14px;
        color: #353535;
      }
      /* 최상위 프레임(화면) 단위 그룹 카드: 프레임 타이틀 + 검토 결과를 하나로 묶음 */
      .preview-group {
        background: #ffffff;
        border: 1px solid #D9D9D9;
        border-radius: 10px;
        padding: 16px; /* 항목이 박스가 되어 카드 안쪽에 여백을 두고 배치 */
        margin-bottom: 16px; /* 그룹 카드 사이 간격 */
        overflow: hidden;
      }
      .preview-group-header {
        position: relative;
        cursor: pointer; /* 영역 전체가 접기/펼치기 클릭 대상 */
        user-select: none;
        font-size: 14px;
        font-weight: 700;
        color: #353535;
        height: 40px; /* 타이틀 영역 높이 */
        display: flex;
        align-items: center;
        margin: -16px 0 0; /* 카드 상단 패딩 상쇄 — 아래 간격은 행 패딩이 담당 (호버가 구분선에 붙게) */
        /* overflow를 여기 걸면 하단 풀 와이드 선(::after)까지 잘린다 — 말줄임은 내부 텍스트에 */
      }
      .preview-group-header-text {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis; /* 긴 프레임 이름은 말줄임 */
      }
      /* 타이틀 우측 접기/펼치기 버튼 */
      .preview-group-toggle {
        width: 24px !important;  /* 전역 button 규칙 무시 */
        height: 24px !important;
        min-width: unset;
        padding: 0;
        border: none;
        background: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 0 0 8px;
        flex-shrink: 0;
        line-height: 0;
      }
      .preview-group-toggle svg {
        transition: transform 0.2s ease;
      }
      .preview-group.collapsed .preview-group-toggle svg {
        transform: rotate(180deg); /* 접힘 = 아래 방향 */
      }
      .preview-group.collapsed .preview-group-body {
        display: none;
      }
      .preview-group.collapsed {
        padding-bottom: 0;
      }
      .preview-group.collapsed .preview-group-header {
        margin-bottom: 0;
      }
      .preview-group.collapsed .preview-group-header::after {
        display: none; /* 접힌 카드엔 하단 구분선 불필요 */
      }
      /* 타이틀 아래 카드 끝까지 이어지는 가로선 (카드 패딩 16px을 가로지름) */
      .preview-group-header::after {
        content: '';
        position: absolute;
        left: -16px;
        right: -16px;
        bottom: 0;
        border-bottom: 1px solid #E5E5E5;
      }
      /* 타이틀 구분선과 첫 박스 사이 간격 */
      .preview-group-body {
        margin-top: 12px;
      }
      /* 항목은 각각 박스 — 사이는 구분선 대신 간격으로 */
      .preview-item-wrapper {
        margin-bottom: 8px;
      }
      .preview-item-wrapper:last-child {
        margin-bottom: 0;
      }
      .preview-item-header {
        font-weight: 600;
        color: #000000;
        font-size: 12px;
        margin-bottom: 8px;
      }
      .preview-item {
        background: #F7F7F7; /* 연한 그레이 박스 */
        border: 1px solid #ECECEC;
        border-radius: 8px;
        font-size: 14px;
        margin: 0;
        padding: 12px 14px;
        display: flex; /* 좌측 내용 + 우측 제보 버튼 */
        flex-wrap: wrap; /* 제보 입력창이 아래 줄 전체 폭으로 내려오도록 */
        align-items: flex-start;
        gap: 12px;
      }
      .preview-item:hover {
        background: #F0F0F0;
        border-color: #DCDCDC;
      }
      .preview-item.selected {
        background: #E2F1FF;
        border-color: #1D6CEB; /* 선택 시 파란 테두리 */
      }
      .preview-item-content {
        flex: 1;
        min-width: 0; /* 긴 텍스트가 flex 칸을 넘치지 않게 */
      }
      /* 항목별 "오수정 제보" 버튼 (우측 상단) */
      .preview-report-btn {
        flex-shrink: 0;
        width: 24px !important; /* 전역 button(width:100%, min-width:64px) 무시 */
        height: 24px !important; /* 전역 button height:48px !important 무시 */
        min-width: unset;
        padding: 0;
        margin: 2px 0 0 0; /* '원문' 라벨 높이에 맞춰 살짝 내림 */
        line-height: 0;
        background: none;
        border: none;
        cursor: pointer;
        color: #B0B0B0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .preview-report-btn:hover {
        color: #E5484D; /* 제보(경고) 느낌의 빨강 */
      }
      .preview-report-btn.reported {
        color: #E5484D; /* 이미 제보한 항목은 빨강으로 고정 */
        cursor: default;
      }
      .preview-report-btn svg {
        display: block;
      }
      /* 제보 입력창 (버튼 클릭 시 아래 줄 전체 폭으로 열림) */
      .report-panel {
        flex-basis: 100%; /* flex-wrap 상태에서 한 줄 전체 차지 */
        width: 100%;
        display: none;
        margin-top: 4px;
      }
      .report-panel.open {
        display: block;
      }
      .report-input {
        width: 100%;
        box-sizing: border-box;
        min-height: 56px;
        resize: vertical;
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
        border: 1px solid #D5D5D5;
        border-radius: 6px;
        outline: none;
      }
      .report-input:focus {
        border-color: #2F88FF;
      }
      .report-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 6px;
      }
      .report-actions button {
        width: auto !important;
        min-width: unset;
        height: 32px !important;
        line-height: 1 !important; /* 전역 button의 line-height:48px 덮어써서 글자 세로 중앙 정렬 */
        padding: 0 14px;
        margin: 0;
        font-size: 13px;
        border-radius: 6px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .report-cancel {
        background: #F0F0F0;
        border: 1px solid #D5D5D5;
        color: #353535;
      }
      .report-submit {
        background: #E5484D;
        border: 1px solid #E5484D;
        color: #ffffff;
      }
      .report-submit:disabled {
        opacity: 0.5;
        cursor: default;
      }
      /* 변경 전/제안은 박스 없이 가로 구분선 하나로만 구분 */
      .preview-before-box {
        padding-bottom: 12px;
        border-bottom: 1px solid #E5E5E5;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .preview-after-box {
        padding-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .preview-before {
        color: #333;
        word-break: break-word;
      }
      .preview-after {
        color: #333;
        word-break: break-word;
      }
      /* 수정안 칩 + 키워드 칩을 한 줄로 */
      .preview-after-labels {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
      }
      .reason-item {
        background: #ECECEC; /* 테두리 없이 배경만, 조금 진하게 */
        border: none;
        border-radius: 999px;
        height: 16px;
        line-height: 16px;
        padding: 0 8px;
        font-size: 10px;
        color: #666;
        box-sizing: border-box;
        white-space: nowrap;
      }
      .preview-label {
        font-weight: 600;
        color: #666;
        display: inline-block;
        background: #F5F5F5;
        border: 1px solid #D9D9D9;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 12px;
        width: fit-content;
      }
      .preview-label-before {
        font-weight: 600;
        color: #C62828;
        display: inline-block;
        background: #FFE4E8; /* 테두리 없이 배경만, 조금 진하게 */
        border: none;
        border-radius: 999px; /* 알약 형태 */
        height: 16px;
        line-height: 16px;
        padding: 0 10px;
        box-sizing: border-box;
        font-size: 10px;
        width: fit-content;
      }
      .preview-label-after {
        font-weight: 600;
        color: #1565C0;
        display: inline-block;
        background: #D8EAFB; /* 테두리 없이 배경만, 조금 진하게 */
        border: none;
        border-radius: 999px; /* 알약 형태 */
        height: 16px;
        line-height: 16px;
        padding: 0 10px;
        box-sizing: border-box;
        font-size: 10px;
        width: fit-content;
      }
      .text-changed-before {
        color: #ff3b30;
        font-weight: 500;
      }
      .text-changed-after {
        color: #1D6CEB;
        font-weight: 500;
      }
      .preview-arrow {
        color: #000000;
        margin: 4px 0;
        font-size: 10px;
        text-align: center;
      }
      .no-changes {
        color: #999;
        font-size: 11px;
        text-align: center;
        padding: 12px;
      }
      .message-box {
        display: none;
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 4px;
        padding: 12px;
        margin-top: 12px;
        color: #856404;
        font-size: 14px;
        text-align: center;
      }
      .message-box.active {
        display: block;
      }
      .button-group {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: none;
        flex-direction: row;
        gap: 8px;
        padding: 12px 20px;
        background: white;
        z-index: 1000;
        box-sizing: border-box;
      }
      .button-group.active {
        display: flex;
      }
      .button-group button {
        margin-bottom: 0;
        flex: 1;
      }
      /* 맨 위로 플로팅 버튼 — 스크롤 중에만 보임 */
      .scroll-top-btn {
        position: fixed;
        right: 20px;
        bottom: 72px; /* 하단 버튼 바 위 */
        width: 56px !important; /* 전역 button 규칙(width 100%, height 48px !important)에 안 찌그러지게 고정 */
        height: 56px !important;
        border-radius: 50%;
        border: 1px solid #e5e5e5;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 1500;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        padding: 0;
      }
      .scroll-top-btn.visible {
        opacity: 1;
        pointer-events: auto;
      }
      .scroll-top-btn:hover {
        background: #f5f5f5;
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.8);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2000;
      }
      .loading-overlay.active {
        display: flex;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #1D6CEB;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 12px;
      }
      .loading-progress {
        font-size: 14px;
        color: #1D6CEB;
        font-weight: 500;
        margin-top: 8px;
      }
      .loading-status {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
        text-align: center;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .toast-notification {
        position: fixed;
        bottom: 80px; /* 플로팅 버튼 위에 표시 */
        left: 20px;
        right: 20px;
        width: calc(100% - 40px);
        background: rgba(34, 34, 34, 0.9);

        padding: 12px 20px;
        border-radius: 20px;

      }

        animation: slideUp 0.3s ease-out;
      }

          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }

      .rs-s  { bottom:0; left:6px;  right:6px; height:4px; cursor:s-resize;  }
      .rs-e  { right:0;  top:6px; bottom:6px;  width:4px;  cursor:e-resize;  }
      .rs-w  { left:0;   top:6px; bottom:6px;  width:4px;  cursor:w-resize;  }
      .rs-nw { top:0; left:0;   width:8px; height:8px; cursor:nw-resize; }
      .rs-ne { top:0; right:0;  width:8px; height:8px; cursor:ne-resize; }
      .rs-sw { bottom:0; left:0;  width:8px; height:8px; cursor:sw-resize; }
      .rs-se { bottom:0; right:0; width:8px; height:8px; cursor:se-resize; }

      /* 검토 전 사용법 예시 (결과 없을 때만 JS로 표시) */

      /* ── 상단 탭 바 ── */
      #tabBar {

      /* 탭 바가 떠 있을 때: 각 화면 고정 헤더를 탭 바 아래로 내리고, 화면 내 '← 홈' 링크는 숨김 */

      /* ── 홈 / 기능 화면 (문구 추천·번역) ── */
      #homeView { display: none; }
      /* 홈 메뉴 카드 (흰색 + 아이콘 + 서브 문구) — 전역 button 높이/줄맞춤 규칙을 덮어씀 */

      }

      .usage-sub { font-size: 12px; color: #757575; margin-top: 4px; }
      /* 홈 우상단 설정 아이콘 (홈에서만 보임 — homeView가 숨겨지면 같이 숨음) */
      .home-settings {
        position: fixed;
        top: 14px;
        right: 14px;
        width: 32px !important;
        height: 32px !important;
        min-width: 0;
        padding: 0;
        margin: 0;
        background: none;
        color: #757575;
        border-radius: 6px;

        align-items: center;
        justify-content: center;

      }
      .home-settings:hover { color: #1D6CEB; background: #F7F7F7; }
      /* 추천/번역 헤더 제목 오른쪽 'API 키' 버튼 (검토 화면 초기화 버튼과 같은 형태) */
      .feature-settings-btn {
        width: auto !important;
        height: auto !important;
        min-width: unset;
        line-height: normal !important;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        padding: 5px 10px;
        margin: 0;
        background: none;
        border: 1px solid #D9D9D9;
        border-radius: 6px;
        color: #757575;
        font-size: 12px;
        font-weight: 500;
      }
      .feature-settings-btn:hover { color: #1D6CEB; border-color: #1D6CEB; background: #F7F9FF; }
      /* 키가 저장돼 있으면 초록 톤 + 초록 체크(✓)로 '저장됨' 표시 */
      .feature-settings-btn.has-key { color: #12805C; border-color: #A6E0C8; }
      .feature-settings-btn.has-key:hover { color: #0E6B4D; border-color: #12805C; background: #F1FBF6; }
      .feature-settings-btn.has-key::after {
        content: '✓';
        color: #1EA672;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }
      /* ── API 키 입력 팝업(모달) ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .35);

        padding: 20px;

      }

        background: #FFFFFF;

      .modal-btn-row { display: flex; gap: 8px; margin-top: 16px; }
      .modal-btn-row button { flex: 1; width: auto !important; margin-bottom: 0 !important; }
      .result-label {
        font-size: 12px;
        color: #757575;
        margin: 12px 0 6px 0;
      }
      .result-original {
        font-size: 13px;
        color: #353535;
        background: #F5F5F5;
        border-radius: 6px;
        padding: 10px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .sugg-card {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        border: 1px solid #E0E0E0;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 8px;
      }
      .sugg-text {
        font-size: 14px;
        color: #000000;
        line-height: 1.5;
        white-space: pre-wrap;
        flex: 1;
      }
      /* 추천 사유 (AI가 어떤 기준을 적용했는지) — 문구 아래 작은 회색 글씨 */
      .sugg-main { flex: 1; min-width: 0; }
      .sugg-main .sugg-text { display: block; }
      .sugg-reason {
        margin-top: 6px;
        font-size: 12px;
        color: #757575;
        line-height: 1.4;
      }
      /* 복사 버튼 (아이콘) — 전역 button 규칙 무시 */
      .copy-btn {
        width: auto !important;
        height: auto !important;
        line-height: normal !important;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #FFFFFF;
        border: 1px solid #D9D9D9 !important;
        border-radius: 4px;

      .copy-btn svg { display: block; }
      /* 카드 오른쪽 액션 버튼 묶음 (좋아요 + 복사 세로 배치) */
      .sugg-actions { display: flex; flex-direction: column; gap: 4px; flex: 0 0 auto; }
      /* 좋아요 버튼 — 복사 버튼과 같은 형태, 누르면 파란색으로 고정 */
      .like-btn {
        width: auto !important;
        height: auto !important;
        line-height: normal !important;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #FFFFFF;
        border: 1px solid #D9D9D9 !important;
        border-radius: 4px;
        color: #757575;
        padding: 6px !important;

  <body>
    <!-- 상단 탭 바 (홈이 아닐 때만 표시) — 홈 버튼 + 검토/추천/번역 탭 -->

    <!-- 개인 Gemini API 키 입력 팝업 (모달) -->
    <div id="apiKeyModal" class="modal-overlay">
      <div class="modal" role="dialog" aria-modal="true" aria-label="API 키 설정">
        <div class="modal-title">Gemini API 키</div>
        <div class="modal-desc">추천·번역에 쓸 개인 키를 넣어주세요. <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">무료 발급 →</a></div>
        <input id="apiKeyInput" class="feature-input settings-input" type="password" placeholder="AIza… 로 시작하는 키" autocomplete="off" spellcheck="false" />
        <div id="apiKeyStatus" class="settings-status">저장된 키 없음</div>
        <button id="apiKeyClear" class="modal-clear-link" type="button">저장된 키 삭제</button>
        <div id="usageBox" class="usage-box"></div>
        <div class="modal-btn-row">
          <button id="apiKeyCancel" class="button-secondary">닫기</button>
          <button id="apiKeySave" class="button-primary">저장</button>
        </div>

    <button id="scrollTopBtn" class="scroll-top-btn" title="맨 위로" aria-label="맨 위로">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5" stroke="#4A4A4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <script>
      let previewData = [];
      let lastSelectionText = ''; // 캔버스에서 마지막으로 선택한 영역의 텍스트 (추천/번역 입력창 자동 채움용)
      let hasApiKey = false;      // 개인 Gemini 키 저장 여부
      let lastUsage = null;       // { used, limit, remaining } — 오늘 사용량
      const likedKeys = new Set();    // 이번 세션에서 좋아요한 추천 키 (원본+추천)
      const pendingLikes = new Map(); // 전송 중인 좋아요: key → 버튼
      let selectedNodeIds = new Set(); // 선택된 노드 ID들 (여러 개 선택 가능)
      const reportedKeys = new Set(); // 이미 "오수정 제보"한 항목 (nodeId::after 조합) — 재렌더링돼도 유지
      const pendingReports = new Map(); // 전송 중인 제보: reportKey → { panel, btn, submit } (결과 회신 시 해당 UI 갱신)

      // 항목별 "오수정 제보" 아이콘 (깃발)
      const REPORT_SVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 3v18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M5 4h11l-2 3.5L16 11H5z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      // 제보 상태를 노드+수정안 조합으로 식별 (같은 노드라도 수정안이 바뀌면 새 제보 가능)
      function reportKey(item) { return (item.nodeId || '') + '::' + (item.after || ''); }
      // 검토 후 스크롤 동작 예약:
      // - 최초 검토: 목록 맨 위로
      // - 추가 검토: 새로 추가된 카드 중 가장 위의 것이 화면 중앙에 오도록
      // 이 동안 캔버스 자동 선택의 scrollIntoView는 건너뛰고,
      // 검토가 완전히 끝나는 hide-loading 시점에 한 번 더 확정한다.
      let pendingScroll = null; // { mode: 'top' } | { mode: 'center', ids: Set<nodeId> }

      // 접힌 프레임 그룹 (재렌더링돼도 접힘 상태 유지)
      const collapsedFrames = new Set();

      // UI에서 시작한 선택(SELECT_NODES)이 캔버스 선택 이벤트로 메아리쳐 돌아와
      // 방금 만든 선택 상태(특히 전체 선택)를 덮어쓰지 않도록 잠시 무시한다
      let uiSelectionEchoUntil = 0;

      function performPendingScroll() {
        if (!pendingScroll) return;
        if (pendingScroll.mode === 'top') {
          window.scrollTo({ top: 0, behavior: 'auto' });
          return;
        }
        // 새 카드 중 화면(DOM) 순서상 가장 위의 것을 중앙으로
        const items = document.querySelectorAll('.preview-item');
        for (const el of items) {
          if (pendingScroll.ids.has(el.dataset.nodeId)) {
            el.scrollIntoView({ block: 'center', behavior: 'auto' });
            return;
          }
        }
      }

      // ── 화면 전환 컨트롤러 (홈 / 검토 / 문구추천 / 번역) ──
      let currentView = 'home';
      function activeHeaderEl() {
        if (currentView === 'review') return document.getElementById('topFixed');
        if (currentView === 'recommend') return document.getElementById('recommendHeader');
        if (currentView === 'translate') return document.getElementById('translateHeader');
        return null; // 홈에는 고정 헤더가 없다
      }
      // 본문 상단 여백을 (탭 바 + 현재 활성 고정 헤더) 높이에 맞춘다 (홈이면 기본 여백)
      function adjustTopPadding() {
        if (currentView === 'home') { document.body.style.paddingTop = '20px'; return; }
        const tabBar = document.getElementById('tabBar');
        const tabH = tabBar ? tabBar.offsetHeight : 0;
        const header = activeHeaderEl();
        document.body.style.paddingTop = (tabH + (header ? header.offsetHeight : 0)) + 'px';
      }
      function showView(name) {
        currentView = name;
        document.getElementById('homeView').style.display = name === 'home' ? 'block' : 'none';
        document.getElementById('topFixed').style.display = name === 'review' ? 'flex' : 'none';
        document.getElementById('recommendHeader').style.display = name === 'recommend' ? 'flex' : 'none';
        document.getElementById('translateHeader').style.display = name === 'translate' ? 'flex' : 'none';
        document.getElementById('recommendSection').style.display = name === 'recommend' ? 'block' : 'none';
        document.getElementById('translateSection').style.display = name === 'translate' ? 'block' : 'none';
        // 상단 탭 바: 홈이 아닐 때만 표시하고 현재 탭을 강조
        const tabBar = document.getElementById('tabBar');
        const showTabs = name !== 'home';
        tabBar.classList.toggle('visible', showTabs);
        document.body.classList.toggle('has-tabbar', showTabs);
        document.querySelectorAll('.tab-btn').forEach((t) => {
          t.classList.toggle('active', t.dataset.tab === name);
        });
        // 검토 결과 영역/하단 버튼은 '검토' 화면에서만 보인다.
        // 다른 탭으로 나가면 숨기고, '검토'로 돌아오면 결과가 있을 때 다시 복원한다.
        const ps = document.getElementById('previewSection');
        const bg = document.querySelector('.button-group');
        const hasResults = previewData && previewData.length > 0;
        if (name === 'review') {
          if (ps) ps.classList.toggle('active', hasResults);
          if (bg) bg.classList.toggle('active', hasResults);
        } else {
          if (ps) ps.classList.remove('active');
          if (bg) bg.classList.remove('active');
        }
        // 추천/번역 화면으로 들어올 때 입력창이 비어 있으면 마지막 선택 텍스트로 자동 채움
        if (name === 'recommend' && lastSelectionText) {
          const el = document.getElementById('recommendInput');
          if (el && !el.value.trim()) el.value = lastSelectionText;
        } else if (name === 'translate' && lastSelectionText) {
          const el = document.getElementById('translateInput');
          if (el && !el.value.trim()) el.value = lastSelectionText;
        }
        updateFeatureButtonState();
        adjustTopPadding();
        updateReviewGuide();
        updateUsageLines();
        window.scrollTo({ top: 0 });
      }
      // 사용법 예시: '검토' 화면이면서 아직 결과가 없을 때만 보여준다
      function updateReviewGuide() {
        const g = document.getElementById('reviewEmpty');
        if (!g) return;
        const ps = document.getElementById('previewSection');
        const hasResults = ps && ps.classList.contains('active');
        g.style.display = (currentView === 'review' && !hasResults) ? 'block' : 'none';
        // 초기화 버튼: '검토' 화면 + 결과가 있을 때만 표시
        const resetBtn = document.getElementById('resetReview');
        if (resetBtn) resetBtn.classList.toggle('visible', currentView === 'review' && hasResults);
        // 검토 빈 화면에서는 헤더 하단 구분선 숨김 (결과가 뜨면 다시 표시)
        const topFixed = document.getElementById('topFixed');
        if (topFixed) topFixed.classList.toggle('empty-review', currentView === 'review' && !hasResults);
        adjustTopPadding(); // 헤더 안 일러스트가 켜/꺼지며 헤더 높이가 바뀌므로 본문 여백 재계산
      }
      adjustTopPadding();
      window.addEventListener('resize', adjustTopPadding);
      window.addEventListener('load', adjustTopPadding);

      // 맨 위로 플로팅 버튼 — 스크롤 중에만 표시, 멈추면 잠시 후 숨김
      const scrollTopBtn = document.getElementById('scrollTopBtn');
      let scrollHideTimer = null;
      function hideScrollTopBtnLater() {
        if (scrollHideTimer) clearTimeout(scrollHideTimer);
        scrollHideTimer = setTimeout(() => scrollTopBtn.classList.remove('visible'), 1500);
      }
      window.addEventListener('scroll', () => {
        if (window.scrollY > 150) {
          scrollTopBtn.classList.add('visible');
          hideScrollTopBtnLater();
        } else {
          // 맨 위 근처에서는 굳이 안 보여줌
          scrollTopBtn.classList.remove('visible');
        }
      }, { passive: true });
      // 누르려고 마우스를 올린 동안에는 사라지지 않게
      scrollTopBtn.addEventListener('mouseenter', () => {
        if (scrollHideTimer) clearTimeout(scrollHideTimer);
      });
      scrollTopBtn.addEventListener('mouseleave', hideScrollTopBtnLater);
      scrollTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // 검토 결과 블록(고정 헤더 안) 표시/숨김 — 고정 헤더 높이가 변하므로 본문 패딩 재계산
      function setResultHeaderVisible(on) {
        const rh = document.getElementById('resultHeader');
        if (rh) rh.classList.toggle('active', on);
        adjustTopPadding();
      }

      // 버튼 활성/비활성화 함수
      function updatePreviewButtonState(hasSelection) {
        const previewButton = document.getElementById('preview');
        if (previewButton) {
          previewButton.disabled = !hasSelection;
        }
      }

      // 초기 로드 시 버튼 비활성화 (선택 상태 확인 전까지)
      updatePreviewButtonState(false);

      document.getElementById('preview').onclick = () => {
        if (document.getElementById('preview').disabled) {
          return;
        }
        selectedNodeIds.clear(); // 미리보기 새로고침 시 선택 초기화
        reportedKeys.clear(); // 새 검토면 제보 상태도 초기화
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
          selectAllCheckbox.checked = false;
        }
        // 플로팅 버튼 숨기기
        const buttonGroup = document.querySelector('.button-group');
        if (buttonGroup) {
          buttonGroup.classList.remove('active');
        }
        parent.postMessage({ pluginMessage: { type: 'PREVIEW' } }, '*');
      };

      document.getElementById('selectAll').addEventListener('change', (e) => {
        const checkbox = e.target;
        // 체크박스 상태에 따라 모든 항목 선택/해제
        if (checkbox.checked) {
          // 모두 선택
          selectedNodeIds = new Set(previewData.map(item => item.nodeId));
        } else {
          // 모두 해제
          selectedNodeIds.clear();
        }
        
        // 선택된 노드들을 Figma에도 반영 (에코로 되돌아오는 선택 동기화는 무시)
        uiSelectionEchoUntil = Date.now() + 800;
        parent.postMessage({ 
          pluginMessage: { 
            type: 'SELECT_NODES', 
            nodeIds: Array.from(selectedNodeIds)
          } 
        }, '*');
        
        updateToolbarButtonsState();

        // 선택 표시만 갱신 (전체 재렌더링하면 스크롤이 맨 위로 튕긴다)
        document.querySelectorAll('.preview-item').forEach(el => {
          if (selectedNodeIds.has(el.dataset.nodeId)) el.classList.add('selected');
          else el.classList.remove('selected');
        });
      });

      document.getElementById('apply').onclick = () => {
        // 선택된 항목이 있으면 선택된 항목만, 없으면 모든 항목 변경
        let dataToApply = previewData;
        if (selectedNodeIds.size > 0) {
          dataToApply = previewData.filter(item => selectedNodeIds.has(item.nodeId));
        }
        
        if (dataToApply.length === 0) {
          alert('변경할 항목을 선택해주세요.');
          return;
        }
        
        // 로딩 표시
        const loadingOverlay = document.getElementById('loadingOverlay');
        if (loadingOverlay) {
          loadingOverlay.classList.add('active');
        }
        
        parent.postMessage({ pluginMessage: { type: 'APPLY', data: dataToApply } }, '*');
      };

      // 8방향 리사이즈 핸들
      (() => {
        // dw/dh: 마우스 이동 방향이 너비/높이에 적용되는 부호
        const handles = [
          { cls: 'rs-n',  dw:  0, dh: -1 },
          { cls: 'rs-s',  dw:  0, dh:  1 },
          { cls: 'rs-e',  dw:  1, dh:  0 },
          { cls: 'rs-w',  dw: -1, dh:  0 },
          { cls: 'rs-nw', dw: -1, dh: -1 },
          { cls: 'rs-ne', dw:  1, dh: -1 },
          { cls: 'rs-sw', dw: -1, dh:  1 },
          { cls: 'rs-se', dw:  1, dh:  1 },
        ];

        let active = null, startX = 0, startY = 0, startW = 0, startH = 0;

        handles.forEach(({ cls, dw, dh }) => {
          const el = document.querySelector('.' + cls);
          el.addEventListener('mousedown', (e) => {
            active = { dw, dh };
            // 화면 기준 좌표 사용: 창을 움직여도 좌표계가 안 바뀌어 피드백 루프(왼쪽으로 빨려듦) 방지
            startX = e.screenX;
            startY = e.screenY;
            startW = window.innerWidth;
            startH = window.innerHeight;
            e.preventDefault();
          });
        });

        document.addEventListener('mousemove', (e) => {
          if (!active) return;
          const dx = e.screenX - startX;
          const dy = e.screenY - startY;
          const w = active.dw !== 0 ? Math.max(300, Math.min(800,  startW + active.dw * dx)) : startW;
          const h = active.dh !== 0 ? Math.max(400, Math.min(1200, startH + active.dh * dy)) : startH;
          // 왼쪽(dw<0)/위쪽(dh<0) 핸들이면 반대쪽 가장자리를 고정하도록 앵커 표시
          parent.postMessage({ pluginMessage: {
            type: 'RESIZE_UI',
            width: Math.round(w),
            height: Math.round(h),
            anchorRight: active.dw < 0,
            anchorBottom: active.dh < 0
          } }, '*');
        });

        document.addEventListener('mouseup', () => { active = null; });
      })();

      // 코멘트 삭제는 카드를 선택했을 때만 활성화
      function updateToolbarButtonsState() {
        const hasSel = selectedNodeIds.size > 0;
        const clearBtn = document.getElementById('clearAnnotations');
        if (clearBtn) clearBtn.disabled = !hasSel;
      }

      // 검토 결과 + 캔버스 코멘트를 모두 지우고 빈 화면으로 되돌린다
      function resetReview() {
        parent.postMessage({ pluginMessage: { type: 'CANCEL' } }, '*'); // 캔버스 어노테이션 제거
        document.getElementById('previewSection').classList.remove('active');
        const buttonGroup = document.querySelector('.button-group');
        if (buttonGroup) buttonGroup.classList.remove('active');
        previewData = [];
        selectedNodeIds.clear();
        reportedKeys.clear();
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) selectAllCheckbox.checked = false;
        setResultHeaderVisible(false); // '검토 결과 N건' 헤더 숨김
        updateReviewGuide();           // 사용법 예시 일러스트 다시 표시 + 초기화 버튼 숨김
      }
      document.getElementById('cancel').onclick = resetReview;
      document.getElementById('resetReview').onclick = resetReview;

      // 토스트 알림 표시 함수
      function showToast(message) {
        const toast = document.getElementById('toastNotification');
        if (toast) {
          toast.textContent = message;
          toast.classList.add('show');
          
          // 3초 후 자동으로 숨기기
          setTimeout(() => {
            toast.classList.remove('show');
          }, 3000);
        }
      }

      window.addEventListener('message', (event) => {
        if (event.data.pluginMessage.type === 'selection-changed') {
          updatePreviewButtonState(event.data.pluginMessage.hasSelection);
        }

        // 캔버스에서 노드/코멘트를 선택하면 검토 목록에서도 같은 항목을 선택 표시
        if (event.data.pluginMessage.type === 'canvas-selection') {
          // 검토 직후의 자동 선택은 무시 — 목록은 미선택 상태로 시작
          if (pendingScroll) return;
          // UI에서 방금 시작한 선택의 메아리도 무시 (전체 선택 등을 덮어쓰지 않게)
          if (Date.now() < uiSelectionEchoUntil) return;
          const ids = event.data.pluginMessage.nodeIds || [];
          selectedNodeIds = new Set(ids);
          let firstEl = null;
          document.querySelectorAll('.preview-item').forEach(el => {
            if (selectedNodeIds.has(el.dataset.nodeId)) {
              el.classList.add('selected');
              if (!firstEl) firstEl = el;
            } else {
              el.classList.remove('selected');
            }
          });
          const selectAllCheckbox = document.getElementById('selectAll');
          if (selectAllCheckbox) selectAllCheckbox.checked = false;
          updateToolbarButtonsState();
          // 선택된 첫 항목이 목록 가운데로 오게 스크롤
          // (검토 직후의 자동 선택은 제외 — 맨 아래 스크롤을 덮어쓰지 않도록)
          if (firstEl && firstEl.scrollIntoView && !pendingScroll) {
            firstEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }
        }
        
        if (event.data.pluginMessage.type === 'show-toast') {
          showToast(event.data.pluginMessage.message);
        }

        if (event.data.pluginMessage.type === 'report-result') {
          const { key, ok, error } = event.data.pluginMessage;
          const p = pendingReports.get(key);
          pendingReports.delete(key);
          if (ok) {
            reportedKeys.add(key);
            if (p) {
              p.panel.classList.remove('open');
              p.btn.classList.add('reported');
              p.btn.title = '제보됨 — 이 수정안을 잘못됐다고 알림';
              p.btn.setAttribute('aria-label', p.btn.title);
            }
            showToast('제보를 보냈어요. 감사합니다!');
          } else {
            if (p && p.submit) { p.submit.disabled = false; p.submit.textContent = '제보 보내기'; }
            showToast('제보 실패: ' + (error || '잠시 후 다시 시도해주세요.'));
          }
        }

        // 좋아요 전송 결과 — 성공하면 버튼을 파란색으로 고정
        if (event.data.pluginMessage.type === 'like-result') {
          const likeMsg = event.data.pluginMessage;
          const likeBtn = pendingLikes.get(likeMsg.key);
          pendingLikes.delete(likeMsg.key);
          if (likeMsg.ok) {
            likedKeys.add(likeMsg.key);
            if (likeBtn) {
              likeBtn.classList.add('liked');
              likeBtn.title = '좋아요한 추천이에요';
              likeBtn.disabled = false;
            }
            showToast('좋아요! 예시 후보로 저장했어요.');
          } else {
            if (likeBtn) likeBtn.disabled = false;
            showToast('좋아요 저장 실패: ' + (likeMsg.error || '잠시 후 다시 시도해주세요.'));
          }
        }

        if (event.data.pluginMessage.type === 'recommend-result') {
          const recOrig = event.data.pluginMessage.original || '';
          renderRecommend(recOrig, event.data.pluginMessage.suggestions || []);
          if (recOrig) setRecommendCompact(true, recOrig); // 결과가 오면 헤더를 컴팩트 모드로
        }

        if (event.data.pluginMessage.type === 'translate-result') {
          renderTranslate(event.data.pluginMessage.original || '', event.data.pluginMessage.translated || '', event.data.pluginMessage.direction || '');
        }

        // 개인 API 키 상태 (저장/삭제/조회 응답)
        if (event.data.pluginMessage.type === 'api-key-status') {
          const m = event.data.pluginMessage;
          hasApiKey = !!m.hasKey;
          const statusEl = document.getElementById('apiKeyStatus');
          if (statusEl) statusEl.textContent = hasApiKey ? ('저장된 키: ' + (m.masked || '••••')) : '저장된 키 없음';
          if (m.justSaved) {
            const inp = document.getElementById('apiKeyInput');
            if (inp) inp.value = '';
            showToast('API 키를 저장했어요.');
            closeApiKeyModal();
          }
          if (m.justCleared) showToast('API 키를 삭제했어요.');
          updateUsageLines();
        }

        // 오늘 사용량 갱신
        if (event.data.pluginMessage.type === 'usage-update') {
          const m = event.data.pluginMessage;
          lastUsage = { used: m.used || 0, limit: m.limit || 0, remaining: (typeof m.remaining === 'number') ? m.remaining : 0 };
          updateUsageLines();
        }

        // 키가 없어 AI를 못 부른 경우 → 입력 팝업 열기
        if (event.data.pluginMessage.type === 'need-api-key') {
          showToast('먼저 개인 Gemini API 키를 설정해주세요.');
          openApiKeyModal();
        }

        // 캔버스에서 프레임/텍스트 선택 시 → 추천/번역 입력창에 자동 채움.
        // 선택 해제(빈 문자열) 시 → 자동으로 채워졌던 값 그대로면 입력창을 비운다(직접 타이핑한 건 보존).
        if (event.data.pluginMessage.type === 'selection-text') {
          const text = event.data.pluginMessage.text || '';
          const el = currentView === 'recommend' ? document.getElementById('recommendInput')
                   : currentView === 'translate' ? document.getElementById('translateInput')
                   : null;
          if (text) {
            if (el) el.value = text;
            lastSelectionText = text;
          } else {
            if (el && lastSelectionText && el.value === lastSelectionText) el.value = '';
            lastSelectionText = '';
          }
          updateFeatureButtonState();
        }

        if (event.data.pluginMessage.type === 'show-loading') {
          const loadingOverlay = document.getElementById('loadingOverlay');
          const loadingProgress = document.getElementById('loadingProgress');
          const loadingStatus = document.getElementById('loadingStatus');
          if (loadingOverlay) {
            loadingOverlay.classList.add('active');
          }
          if (loadingProgress) {
            loadingProgress.textContent = '0%';
          }
          if (loadingStatus) {
            loadingStatus.textContent = '준비 중...';
          }
        }
        
        if (event.data.pluginMessage.type === 'update-progress') {
          const loadingProgress = document.getElementById('loadingProgress');
          const loadingStatus = document.getElementById('loadingStatus');
          if (loadingProgress) {
            const progress = event.data.pluginMessage.progress || 0;
            loadingProgress.textContent = Math.round(progress) + '%';
          }
          if (loadingStatus && event.data.pluginMessage.status) {
            loadingStatus.textContent = event.data.pluginMessage.status;
          }
        }
        
        if (event.data.pluginMessage.type === 'hide-loading') {
          const loadingOverlay = document.getElementById('loadingOverlay');
          if (loadingOverlay) {
            loadingOverlay.classList.remove('active');
          }
          // 검토가 완전히 끝난 시점에 예약된 스크롤 확정
          if (pendingScroll) {
            requestAnimationFrame(() => {
              performPendingScroll();
              // 캔버스 선택 동기화(canvas-selection)가 뒤늦게 도착해
              // 다른 곳으로 스크롤을 걸 수 있으므로, 억제를 잠시 뒤에 해제
              setTimeout(() => {
                performPendingScroll(); // 그 사이 끼어든 스크롤이 있어도 최종 위치 확정
                pendingScroll = null;
              }, 800);
            });
          }
        }

        if (event.data.pluginMessage.type === 'preview-add') {
          const newItems = event.data.pluginMessage.data;
          const wasEmpty = previewData.length === 0;
          const existingIds = new Set(previewData.map(item => item.nodeId));
          // nodeId 기준으로 중복 제거 후 누적
          const map = new Map(previewData.map(item => [item.nodeId, item]));
          for (const item of newItems) {
            map.set(item.nodeId, item);
          }
          previewData = Array.from(map.values());
          // 검토 직후에는 목록을 미선택 상태로 시작
          selectedNodeIds.clear();
          const selectAllCb = document.getElementById('selectAll');
          if (selectAllCb) selectAllCb.checked = false;
          updateToolbarButtonsState();
          displayPreview(previewData);

          // 최초 검토면 맨 위로, 추가 검토면 새 카드 중 가장 위의 것을 중앙으로.
          // 검토가 끝나는 hide-loading에서 한 번 더 확정한다 (중간 메시지에 밀리지 않게)
          if (newItems.length > 0) {
            if (wasEmpty) {
              pendingScroll = { mode: 'top' };
            } else {
              let freshIds = newItems.filter(it => !existingIds.has(it.nodeId)).map(it => it.nodeId);
              if (freshIds.length === 0) freshIds = newItems.map(it => it.nodeId); // 같은 영역 재검토면 그 항목들 기준
              pendingScroll = { mode: 'center', ids: new Set(freshIds) };
            }
            requestAnimationFrame(performPendingScroll);
          }
        }
        
        if (event.data.pluginMessage.type === 'remove-changed-items') {
          // 변경된 항목만 리스트에서 제거
          const changedNodeIds = event.data.pluginMessage.changedNodeIds;
          const beforeLength = previewData.length;
          
          previewData = previewData.filter(item => !changedNodeIds.includes(item.nodeId));
          
          // 변경된 항목을 선택 상태에서 제거
          changedNodeIds.forEach(nodeId => {
            selectedNodeIds.delete(nodeId);
          });
          updateToolbarButtonsState();
          
          console.log(`[UI] 변경 전 ${beforeLength}개, 변경된 항목: ${changedNodeIds.length}개, 남은 항목: ${previewData.length}개`);
          
          // 모든 항목이 변경되면 플로팅 버튼 숨기기
          if (previewData.length === 0) {
            const buttonGroupEl = document.querySelector('.button-group');
            if (buttonGroupEl) {
              buttonGroupEl.classList.remove('active');
            }
            document.getElementById('previewSection').classList.remove('active');
            setResultHeaderVisible(false);
          }
          
          // 리스트 업데이트
          displayPreview(previewData);
        }
      });

      function displayPreview(data) {
        const previewList = document.getElementById('previewList');
        const previewSection = document.getElementById('previewSection');
        const btnGroupEl = document.querySelector('.button-group');
        
        // 변경점이 없으면 미리보기 섹션 및 플로팅 버튼 숨기기
        if (data.length === 0) {
          previewSection.classList.remove('active');
          if (btnGroupEl) {
            btnGroupEl.classList.remove('active');
          }
          selectedNodeIds.clear(); // 선택 초기화
          updateReviewGuide(); // 결과 없으면 사용법 예시 다시 표시
          return;
        }

        // 플로팅 버튼 그룹 표시
        if (btnGroupEl) {
          btnGroupEl.classList.add('active');
        }

        previewList.innerHTML = '';
        
        // 검토 결과 제목에 총 건수 업데이트
        const previewTitle = document.querySelector('.preview-title');
        if (previewTitle) {
          previewTitle.innerHTML = `검토 결과 <span class="result-count">${data.length}</span>건`;
        }
        
        // 전체 선택 체크박스 상태 업데이트
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
          selectAllCheckbox.checked = selectedNodeIds.size === data.length && data.length > 0;
        }
        
        // innerHTML에 넣기 전 HTML 특수문자 이스케이프 (캔버스 텍스트에 <, & 등이 있어도 안전)
        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        // 변경 구간을 단어 단위로 색칠한다.
        // "방범구역"→"경비구역"이 "방범/경비"만 색칠되거나, 마침표만 바뀌어 색칠이 안 보이는 일이
        // 없도록 양옆 공통 부분의 인접 단어(공백 전까지)를 흡수해 단어 전체를 강조한다.
        function mergeWhitespaceChangeParts(parts) {
          const out = [];
          for (let idx = 0; idx < parts.length; idx++) {
            const p = parts[idx];
            if (!p.changed) { out.push(p); continue; }
            let prefix = '';
            const prev = out[out.length - 1];
            if (prev && !prev.changed) {
              const m = prev.before.match(/(\S+)$/); // 이전 공통부분의 꼬리 단어
              if (m) {
                prefix = m[1];
                prev.before = prev.before.slice(0, -prefix.length);
                prev.after = prev.after.slice(0, -prefix.length);
                if (prev.before === '') out.pop();
              }
            }
            let suffix = '';
            const next = parts[idx + 1];
            if (next && !next.changed) {
              const m = next.before.match(/^(\S+)/); // 다음 공통부분의 머리 단어
              if (m) {
                suffix = m[1];
                // 변경과 무관한 꼬리 조사는 끌어오지 않는다 ("고객인증번호를"의 '를' 등)
                // 단, 변경 내용이 공백·문장부호뿐이면(띄어쓰기 변경) 조사까지 끌어와야 차이가 보인다
                const coreHasWord = /[0-9A-Za-z가-힣]/.test(p.before) || /[0-9A-Za-z가-힣]/.test(p.after);
                if (coreHasWord) {
                  const pm = suffix.match(/(에게서|에서|에게|까지|부터|처럼|보다|으로|이나|라도|마저|조차|[을를이가은는과와도만의에로])$/);
                  if (pm) suffix = suffix.slice(0, suffix.length - pm[0].length);
                }
                if (suffix) {
                  next.before = next.before.slice(suffix.length);
                  next.after = next.after.slice(suffix.length);
                }
              }
            }
            out.push({ before: prefix + p.before + suffix, after: prefix + p.after + suffix, changed: true });
          }
          return out;
        }

        // 변경된 부분을 찾아서 색상으로 강조하는 함수
        function highlightChanges(before, after) {
          if (before === after) {
            return { beforeHtml: before, afterHtml: after };
          }
          
          // 현재 위치에서 가장 가까운 공통 부분을 찾아 변경/공통 구간 구분
          const parts = [];
          let i = 0, j = 0;
          const minMatchLen = 2;
          
          while (i < before.length || j < after.length) {
            let bestK = -1, bestL = -1, bestMatchLen = 0;
            
            // (i,j)에 가장 가까운 공통 부분 찾기 (거리 최소화)
            for (let k = i; k < before.length; k++) {
              for (let l = j; l < after.length; l++) {
                let matchLen = 0;
                while (k + matchLen < before.length && 
                       l + matchLen < after.length && 
                       before[k + matchLen] === after[l + matchLen]) {
                  matchLen++;
                }
                const dist = (k - i) + (l - j);
                const bestDist = (bestK - i) + (bestL - j);
                if ((matchLen >= minMatchLen || (matchLen > 0 && (k + matchLen === before.length || l + matchLen === after.length))) &&
                    (bestK < 0 || dist < bestDist || (dist === bestDist && matchLen > bestMatchLen))) {
                  bestK = k; bestL = l; bestMatchLen = matchLen;
                }
              }
            }
            
            if (bestK >= 0 && bestMatchLen > 0) {
              if (bestK > i || bestL > j) {
                parts.push({
                  before: before.substring(i, bestK),
                  after: after.substring(j, bestL),
                  changed: true
                });
              }
              parts.push({
                before: before.substring(bestK, bestK + bestMatchLen),
                after: after.substring(bestL, bestL + bestMatchLen),
                changed: false
              });
              i = bestK + bestMatchLen;
              j = bestL + bestMatchLen;
            } else {
              parts.push({
                before: before.substring(i),
                after: after.substring(j),
                changed: true
              });
              break;
            }
          }
          
          // 공백만 바뀐 띄어쓰기 변경은 단어 단위로 색 범위를 넓힌다
          const merged = mergeWhitespaceChangeParts(parts);

          // HTML 생성 (캔버스 텍스트에 <, & 등이 있어도 깨지지 않게 이스케이프)
          const beforeHtml = merged.map(part =>
            part.changed
              ? `<span class="text-changed-before">${escapeHtml(part.before)}</span>`
              : escapeHtml(part.before)
          ).join('');

          const afterHtml = merged.map(part =>
            part.changed
              ? `<span class="text-changed-after">${escapeHtml(part.after)}</span>`
              : escapeHtml(part.after)
          ).join('');
          
          return { beforeHtml, afterHtml };
        }
        
        // 최상위 프레임(화면) 기준으로 묶기 — 등장 순서 유지
        const frameGroups = new Map(); // frameId -> { name, items }
        for (const item of data) {
          const key = item.frameId || '';
          if (!frameGroups.has(key)) frameGroups.set(key, { name: item.frameName || '', items: [] });
          frameGroups.get(key).items.push(item);
        }

        for (const [frameKey, frameGroup] of frameGroups) {
          // 프레임 타이틀 + 결과들을 하나의 그룹 카드로
          const groupEl = document.createElement('div');
          groupEl.className = 'preview-group';
          if (collapsedFrames.has(frameKey)) groupEl.classList.add('collapsed');
          if (frameGroup.name) {
            const groupHeader = document.createElement('div');
            groupHeader.className = 'preview-group-header';
            groupHeader.setAttribute('role', 'button');
            groupHeader.tabIndex = 0;
            groupHeader.setAttribute('aria-label', frameGroup.name + ' 목록 접기/펼치기');
            const headerText = document.createElement('span');
            headerText.className = 'preview-group-header-text';
            headerText.textContent = frameGroup.name;
            groupHeader.appendChild(headerText);
            // 우측 접기/펼치기 화살표 (ic_화살표, 더보기)
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'preview-group-toggle';
            toggleBtn.title = '목록 접기/펼치기';
            toggleBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.75 13.625L12 9.375L16.25 13.625" stroke="#353535" stroke-linecap="square"/></svg>';
            groupHeader.appendChild(toggleBtn);
            // 타이틀 영역 전체를 눌러도 접기/펼치기 (화살표 버튼 클릭은 버블링으로 함께 처리)
            groupHeader.addEventListener('click', () => {
              if (collapsedFrames.has(frameKey)) collapsedFrames.delete(frameKey);
              else collapsedFrames.add(frameKey);
              groupEl.classList.toggle('collapsed');
            });
            // 키보드(Enter/Space)로도 접기/펼치기
            groupHeader.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                groupHeader.click();
              }
            });
            groupEl.appendChild(groupHeader);
          }
          const groupBody = document.createElement('div');
          groupBody.className = 'preview-group-body';

          frameGroup.items.forEach((item) => {
          // Wrapper div 생성
          const wrapper = document.createElement('div');
          wrapper.className = 'preview-item-wrapper';

          // Preview item div 생성
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.style.cursor = 'pointer';
          div.dataset.nodeId = item.nodeId;
          div.setAttribute('role', 'button');
          div.tabIndex = 0;
          div.setAttribute('aria-label', '수정 제안: ' + item.before + ' → ' + item.after);
          
          // 선택된 항목이면 선택 상태 표시
          if (selectedNodeIds.has(item.nodeId)) {
            div.classList.add('selected');
          }
          
          // 변경된 부분 강조
          const { beforeHtml, afterHtml } = highlightChanges(item.before, item.after);

      // ── 결과 렌더링 ──
      function escapeHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      // 복사 아이콘 (버튼 안에 텍스트 대신 사용)
      var COPY_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';
      // 좋아요(엄지) 아이콘
      var LIKE_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 10h3v11H3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M6 19.5V11l4.8-7.2c.9-1.3 3-.6 2.9 1L13 9h5.6a2 2 0 0 1 2 2.4l-1.5 7a2 2 0 0 1-2 1.6H8.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      // 원본 대비 추천 문구에서 바뀐(새로 들어온) 단어를 형광펜(<span class="sugg-diff">)으로 감싼 HTML 생성
      // 단어 단위 LCS — 원본과 공통인 단어는 그대로, 나머지(바뀜·추가)만 표시
      function diffMarkHtml(original, suggestion) {
        const oWords = String(original).split(/\s+/).filter(Boolean);
        const parts = String(suggestion).split(/(\s+)/); // 단어와 공백을 순서대로 보존
        const sWords = [];
        for (const p of parts) { if (p && !/^\s+$/.test(p)) sWords.push(p); }
        let marked = null;
        if (oWords.length && sWords.length && oWords.length * sWords.length <= 40000) {
          const n = oWords.length, m = sWords.length;
          const dp = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
          for (let i = n - 1; i >= 0; i--) {
            for (let j = m - 1; j >= 0; j--) {
              dp[i][j] = oWords[i] === sWords[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
            }
          }
          marked = new Array(m).fill(true); // true = 바뀐 단어
          let i = 0, j = 0;
          while (i < n && j < m) {
            if (oWords[i] === sWords[j]) { marked[j] = false; i++; j++; }
            else if (dp[i + 1][j] >= dp[i][j + 1]) i++;
            else j++;
          }
        }
        let html = '', wi = 0;
        for (const p of parts) {
          if (!p) continue;
          if (/^\s+$/.test(p)) { html += p.indexOf('\n') !== -1 ? '<br>' : ' '; continue; }
          const esc = escapeHtml(p);
          html += (marked && marked[wi]) ? '<span class="sugg-diff">' + esc + '</span>' : esc;
          wi++;
        }
        return html;
      }
      function renderRecommend(original, suggestions) {
        const list = document.getElementById('recommendList');
        if (!list) return;
        // 원본은 상단 고정 '입력 내용' 박스에 보이므로 결과에는 표시하지 않는다
        let html = '';
        if (!suggestions.length) {
          html += '<div class="result-empty">추천 결과가 없어요. 다시 시도해 주세요.</div>';
          list.innerHTML = html;
          adjustTopPadding();
          return;
        }
        html += '<div class="result-label">추천 문구</div>';
        suggestions.forEach((s) => {
          // 문자열(예시 사전) 또는 {text, reason}(AI) 둘 다 지원
          const item = (typeof s === 'string') ? { text: s, reason: '' } : { text: s.text || '', reason: s.reason || '' };
          const likeKey = encodeURIComponent(original + '\\u0001' + item.text); // 문구에 안 나올 구분자로 원본/추천 경계 표시 (키 충돌 방지)
          const liked = likedKeys.has(likeKey);
          html += '<div class="sugg-card"><div class="sugg-main"><span class="sugg-text">' + diffMarkHtml(original, item.text) + '</span>' +
            (item.reason ? '<div class="sugg-reason">' + escapeHtml(item.reason) + '</div>' : '') +
            '</div><div class="sugg-actions">' +
            '<button class="like-btn' + (liked ? ' liked' : '') + '" title="' + (liked ? '좋아요한 추천이에요' : '이 추천 좋아요 — 예시 후보로 저장') + '" aria-label="좋아요"' +
            ' data-like-key="' + likeKey + '" data-like-orig="' + encodeURIComponent(original) + '" data-like-text="' + encodeURIComponent(item.text) + '" data-like-reason="' + encodeURIComponent(item.reason) + '">' + LIKE_ICON + '</button>' +
            '<button class="copy-btn" title="복사" aria-label="복사" data-copy="' + encodeURIComponent(item.text) + '">' + COPY_ICON + '</button>' +
            '</div></div>';
        });
        list.innerHTML = html;
        wireCopyButtons(list);
        wireLikeButtons(list);
        adjustTopPadding();
      }
      function renderTranslate(original, translated, direction) {
        const box = document.getElementById('translateResult');
        if (!box) return;
        const dirLabel = direction === 'ko->en' ? '한국어 → 영어' : (direction === 'en->ko' ? '영어 → 한국어' : '');
        // 원본은 입력창에 그대로 보이므로 결과에는 표시하지 않는다
        let html = '<div class="result-label">번역' + (dirLabel ? ' (' + dirLabel + ')' : '') + '</div>';
        html += '<div class="sugg-card"><span class="sugg-text">' + escapeHtml(translated) +
          '</span><button class="copy-btn" title="복사" aria-label="복사" data-copy="' + encodeURIComponent(translated) + '">' + COPY_ICON + '</button></div>';
        box.innerHTML = html;
        wireCopyButtons(box);
      }
      function wireCopyButtons(container) {
        container.querySelectorAll('.copy-btn').forEach((b) => {
          b.onclick = () => copyText(decodeURIComponent(b.dataset.copy));
        });
      }
      // 좋아요 버튼 — 누르면 원본+추천 쌍을 제보 저장소로 보낸다 (예시 후보 수집)
      function wireLikeButtons(container) {
        container.querySelectorAll('.like-btn').forEach((b) => {
          b.onclick = () => {
            const key = b.dataset.likeKey;
            if (likedKeys.has(key)) { showToast('이미 좋아요한 추천이에요.'); return; }
            if (pendingLikes.has(key)) return; // 전송 중 중복 클릭 무시
            pendingLikes.set(key, b);
            b.disabled = true;
            parent.postMessage({ pluginMessage: {
              type: 'LIKE_SUGGESTION',
              key: key,
              before: decodeURIComponent(b.dataset.likeOrig || ''),
              after: decodeURIComponent(b.dataset.likeText || ''),
              comment: decodeURIComponent(b.dataset.likeReason || ''),
            } }, '*');
          };
        });
      }
      function copyText(t) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(t).then(() => showToast('복사했어요.')).catch(() => fallbackCopy(t));
            return;
          }
        } catch (_e) { /* 폴백으로 */ }
        fallbackCopy(t);
      }
      function fallbackCopy(t) {
        const ta = document.createElement('textarea');
        ta.value = t;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast('복사했어요.'); }
        catch (_e) { showToast('복사에 실패했어요.'); }
        document.body.removeChild(ta);
      }

      // 처음엔 홈 화면부터 보여준다
      showView('home');
    </script>
  </body>
</html>
